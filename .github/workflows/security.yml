name: security check

on:
  push:
    branches:
      - main
    paths:
      - '**.tf'
      - '!**.md'

permissions:
  contents: read

jobs: 
  secirity-scan-on-workflows:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
    - name: checkout repo
      uses: actions/checkout@v4

    - name: Run Checkov Security Scan on workflows yml files
      uses: bridgecrewio/checkov-action@master
      with:
        directory:  .github/workflows
        output_format: cli
        soft_fail: true
        quiet: true  

  secirity-scan-on-terraform-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
    - name: checkout repo
      uses: actions/checkout@v4

    - name: Run Checkov Security Scan on terraform files
      uses: bridgecrewio/checkov-action@master
      with:
        directory:  .
        output_format: cli
        soft_fail: true
        quiet: true
